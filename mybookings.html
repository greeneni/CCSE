<meta charset="UTF-8">

<title>My Bookings — CCSE</title>
<style>

:root {
    --primary: #800000;
    --secondary: #a52a2a;
    --bg: #f5f5f5;
    --text: #333;
    --white: #fff;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
body { background: var(--bg); color: var(--text); }

.navbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px 40px; background: var(--white);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.logo { font-weight: bold; color: var(--primary); font-size: 1.1rem; }
.nav-links { display: flex; gap: 20px; list-style: none; flex-wrap: wrap; }
.nav-links a { text-decoration: none; color: var(--text); transition: color 0.2s; }
.nav-links a:hover, .nav-links a.active { color: var(--primary); font-weight: bold; }
.btn-primary {
    background: var(--primary); color: white;
    padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer;
    transition: background 0.2s;
}
    
    .logo a {
        text-decoration: none;
        color: inherit;
    }
    
.btn-primary:hover { background: var(--secondary); }

.page-header {
    background: linear-gradient(to right, var(--primary), var(--secondary));
    color: white; padding: 50px 40px; text-align: center;
}
.page-header h1 { font-size: 2rem; margin-bottom: 8px; }
.page-header p { opacity: 0.88; }

.content { max-width: 900px; margin: 36px auto; padding: 0 24px; }

/* TABS */
.tabs { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
.tab {
    padding: 8px 20px; border-radius: 20px;
    border: 2px solid var(--primary); background: transparent;
    color: var(--primary); cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
}
.tab.active, .tab:hover { background: var(--primary); color: white; }

/* BOOKING CARD */
.booking-card {
    background: var(--white); border-radius: 12px;
    margin-bottom: 16px; box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    overflow: hidden; transition: box-shadow 0.2s;
}
.booking-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.12); }

.card-main {
    display: flex; justify-content: space-between;
    align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 20px 24px;
}

.booking-info h3 { font-size: 1.05rem; color: var(--primary); margin-bottom: 4px; }
.booking-info .meta { font-size: 0.87rem; color: #666; margin-bottom: 3px; }
.booking-info .services-tag {
    display: inline-block; margin-top: 5px;
    background: #f9e8e8; color: var(--primary);
    border-radius: 20px; padding: 3px 10px;
    font-size: 0.78rem; font-weight: bold;
}

.badge {
    padding: 5px 14px; border-radius: 20px;
    font-size: 0.8rem; font-weight: bold; white-space: nowrap;
}
.badge.confirmed  { background: #e6f4ea; color: #2e7d32; }
.badge.pending    { background: #fff8e1; color: #f57f17; }
.badge.cancelled  { background: #fdecea; color: #c62828; }
.badge.completed  { background: #e8eaf6; color: #3949ab; }

.booking-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

.btn-cancel {
    padding: 7px 16px; border-radius: 8px;
    border: 2px solid var(--primary);
    background: transparent; color: var(--primary);
    cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
}
.btn-cancel:hover { background: var(--primary); color: white; }

.btn-details {
    padding: 7px 16px; border-radius: 8px;
    border: 2px solid #ccc;
    background: transparent; color: #666;
    cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
}
.btn-details:hover { border-color: var(--primary); color: var(--primary); }

/* EXPANDED DETAILS PANEL */
.card-details {
    display: none;
    border-top: 1px solid #f0f0f0;
    padding: 16px 24px 20px;
    background: #fafafa;
}
.card-details.open { display: block; }
.details-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
}
.detail-item { font-size: 0.85rem; }
.detail-item .label { color: #999; font-size: 0.78rem; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.detail-item .value { color: var(--text); font-weight: 500; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 60px 20px; color: #999; }
.empty-state .icon { font-size: 3.5rem; margin-bottom: 14px; }
.empty-state p { font-size: 0.95rem; margin-bottom: 20px; }

/* RESPONSIVE */
@media (max-width: 600px) {
    .navbar { padding: 12px 16px; }
    .card-main { flex-direction: column; align-items: flex-start; }
}


/* ── NAV ICONS — hollow SVG style ── */
.nav-links a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 8px;
    transition: background 0.2s, color 0.2s, transform 0.15s;
}
.nav-links a:hover, .nav-links a.active {
    background: #f9e8e8;
    color: var(--primary) !important;
    font-weight: bold;
    transform: translateY(-1px);
}
.nav-icon {
    width: 18px;
    height: 18px;
    display: inline-block;
    flex-shrink: 0;
    transition: transform 0.2s;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    vertical-align: middle;
}
.nav-links a:hover .nav-icon,
.nav-links a.active .nav-icon {
    transform: scale(1.2);
}
/* ── Logout button: raised red in dark mode ── */
.btn-logout {
    background: transparent;
    color: var(--primary);
    border: 2px solid var(--primary);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
}
.btn-logout:hover { background: var(--primary); color: white; }
/* ── Nav-right tight spacing ── */
.nav-right {
    display: flex;
    align-items: center;
    gap: 6px;
}


/* ── GLOBAL DARK MODE — Black + Red high-contrast theme ── */
body.dark-mode {
    background: #0a0a0a !important;
    color: #f0f0f0 !important;
}
body.dark-mode .navbar {
    background: #111111 !important;
    box-shadow: 0 2px 8px rgba(0,0,0,0.6) !important;
    border-bottom: 1px solid #cc0000 !important;
}
body.dark-mode .nav-links a { color: #f0f0f0 !important; }
body.dark-mode .logo { color: #ff3333 !important; }
body.dark-mode .user-badge {
    background: rgba(204,0,0,0.2) !important;
    border-color: #cc0000 !important;
    color: #ff4444 !important;
}
body.dark-mode .user-badge:hover {
    background: rgba(204,0,0,0.35) !important;
}
body.dark-mode .btn-primary {
    background: #cc0000 !important;
    color: #ffffff !important;
}
body.dark-mode .btn-primary:hover { background: #aa0000 !important; }
body.dark-mode .btn-logout {
    background: #cc0000 !important;
    border-color: #cc0000 !important;
    color: #ffffff !important;
}
body.dark-mode .btn-logout:hover { background: #aa0000 !important; border-color: #aa0000 !important; }
body.dark-mode .nav-links a:hover,
body.dark-mode .nav-links a.active {
    background: rgba(204,0,0,0.2) !important;
    color: #ff4444 !important;
}

body.dark-mode .page-header {
    background: linear-gradient(to right, #330000, #660000) !important;
}
body.dark-mode .booking-card {
    background: #1a1a1a !important;
    box-shadow: 0 3px 10px rgba(0,0,0,0.5) !important;
    border: 1px solid #2a2a2a !important;
}
body.dark-mode .booking-info h3 { color: #ff4444 !important; }
body.dark-mode .booking-info .meta { color: #aaaaaa !important; }
body.dark-mode .booking-info .services-tag {
    background: rgba(204,0,0,0.2) !important;
    color: #ff6666 !important;
}
body.dark-mode .card-details {
    background: #141414 !important;
    border-top-color: #2a2a2a !important;
}
body.dark-mode .detail-item .label { color: #888888 !important; }
body.dark-mode .detail-item .value { color: #f0f0f0 !important; }
body.dark-mode .btn-cancel {
    border-color: #cc0000 !important;
    color: #ff4444 !important;
}
body.dark-mode .btn-cancel:hover {
    background: #cc0000 !important;
    color: #fff !important;
}
body.dark-mode .btn-details {
    border-color: #444 !important;
    color: #aaa !important;
}
body.dark-mode .btn-details:hover {
    border-color: #cc0000 !important;
    color: #ff4444 !important;
}
body.dark-mode .tab {
    border-color: #cc0000 !important;
    color: #ff4444 !important;
}
body.dark-mode .tab.active,
body.dark-mode .tab:hover {
    background: #cc0000 !important;
    color: #fff !important;
}


/* ── LOGO IMAGE ── */
.logo-img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--primary);
    margin-right: 8px;
    vertical-align: middle;
    flex-shrink: 0;
}
.logo a {
    display: flex;
    align-items: center;
    text-decoration: none;
    color: inherit;
}
/* ── PROFILE ICON BUTTON ── */
.user-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #f9e8e8;
    border: 2px solid #e8c8c8;
    font-size: 1.35rem;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    overflow: hidden;
    padding: 0;
}
.user-badge:hover { background: #f0d0d0; transform: scale(1.08); }


/* Preload dark mode to prevent flash */
/* Preload dark mode to prevent flash */
html.dark-mode-preload body,
html.dark-mode-preload { background: #0a0a0a !important; }

<body>

<header class="navbar">
    <!-- ✏️ LOGO IMAGE: Replace "ccse_logo.jpg" with your logo file name -->
    <div class="logo"><a href="index.html"><img class="logo-img" src="ccse_logo.jpg" alt="CCSE"> CCSE Booking</a></div>
        <ul class="nav-links">
        <li><a href="facilities.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="9" x2="21" y2="9"/><line x1="15" y1="15" x2="21" y2="15"/></svg>Facilities</a></li>
        <li><a href="mybookings.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="8" y2="14" stroke-width="2.5"/><line x1="12" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="8" y2="18" stroke-width="2.5"/><line x1="12" y1="18" x2="16" y2="18"/></svg>My Bookings</a></li>

</header>

<div class="page-header">
    <h1>My Bookings</h1>
    <p>Track, manage, and cancel your reservations here.</p>
</div>

<div class="content">
    <div class="tabs">
        <button class="tab active" onclick="filterBookings('all', this)">All</button>
        <button class="tab" onclick="filterBookings('confirmed', this)">Upcoming</button>
        <button class="tab" onclick="filterBookings('completed', this)">Completed</button>
        <button class="tab" onclick="filterBookings('cancelled', this)">Cancelled</button>
    </div>

    <div id="bookings-container"></div>
</div>

<script>
let allBookings = [];
let currentFilter = 'all';

function loadBookings() {
    allBookings = JSON.parse(localStorage.getItem('ccse_bookings') || '[]');
    renderBookings(currentFilter);
}

function filterBookings(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderBookings(status);
}

function renderBookings(status) {
    const container = document.getElementById('bookings-container');
    const filtered = status === 'all' ? allBookings : allBookings.filter(b => b.status === status);

    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="icon">📋</div>
                <p>${status === 'all' ? "You haven't made any bookings yet." : "No " + status + " bookings found."}</p>
                <button class="btn-primary" onclick="location.href='booking.html'">Book Now</button>
            </div>`;
        return;
    }

    container.innerHTML = filtered.map((b, idx) => {
        const realIdx = allBookings.indexOf(b);
        const dateStr = formatDate(b.date);
        const servicesStr = Array.isArray(b.services) ? b.services.join(', ') : b.services;
        const canCancel = b.status === 'confirmed' || b.status === 'pending';

        return `
        <div class="booking-card" id="card-${realIdx}">
            <div class="card-main">
                <div class="booking-info">
                    <h3>${b.emoji || '📋'} ${b.facility}</h3>
                    <p class="meta">📅 ${dateStr} &nbsp;|&nbsp; ⏰ ${b.time} &nbsp;|&nbsp; Ref: ${b.ref}</p>
                    <p class="meta">👤 ${b.name} &nbsp;|&nbsp; 🎓 ${b.yearSec}</p>
                    <span class="services-tag">🛠 ${servicesStr}</span>
                </div>
                <span class="badge ${b.status}">${capitalize(b.status)}</span>
                <div class="booking-actions">
                    <button class="btn-details" onclick="toggleDetails(${realIdx})">Details ▾</button>
                    ${canCancel ? `<button class="btn-cancel" onclick="cancelBooking(${realIdx})">Cancel</button>` : ''}
                </div>
            </div>
            <div class="card-details" id="details-${realIdx}">
                <div class="details-grid">
                    <div class="detail-item">
                        <div class="label">Student ID</div>
                        <div class="value">${b.studentId}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Email</div>
                        <div class="value">${b.email}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Contact</div>
                        <div class="value">${b.contact}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Facility</div>
                        <div class="value">${b.facility}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Services</div>
                        <div class="value">${servicesStr}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Date & Time</div>
                        <div class="value">${dateStr} at ${b.time}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Notes</div>
                        <div class="value">${b.notes}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Reference</div>
                        <div class="value">${b.ref}</div>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

function toggleDetails(idx) {
    const panel = document.getElementById(`details-${idx}`);
    panel.classList.toggle('open');
    const btn = panel.previousElementSibling.querySelector('.btn-details');
    btn.textContent = panel.classList.contains('open') ? 'Details ▴' : 'Details ▾';
}

function cancelBooking(idx) {
    if (!confirm('Are you sure you want to cancel this booking?')) return;
    allBookings[idx].status = 'cancelled';
    localStorage.setItem('ccse_bookings', JSON.stringify(allBookings));
    renderBookings(currentFilter);
}

function formatDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function capitalize(str) {
    return str ? str.charAt(0).toUpperCase() + str.slice(1) : '';
}

loadBookings();
</script>

<script>
(function(){
    var s = JSON.parse(localStorage.getItem('ccse_session') || 'null');
    if (!s) { location.href = 'login.html'; }
    
})();
</script>

        document.body.classList.add('dark-mode');
    }
})();
</script>
